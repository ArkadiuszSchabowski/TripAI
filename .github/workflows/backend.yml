name: Java_Backend_Pipeline

on:
  push:
    branches: ["**"]
    paths:
      - 'Backend/TripAI_Backend/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'Backend/TripAI_Backend/**'

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile
        working-directory: ./Backend/TripAI_Backend

      - name: Run Unit Tests
        env:
          SPRING_APPLICATION_NAME: TripAI_Backend
          DUFFEL_API_KEY: ${{ secrets.DUFFEL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DUFFEL_API_BASE_URL: ${{ secrets.DUFFEL_API_BASE_URL }}
          GEMINI_API_BASE_URL: ${{ secrets.GEMINI_API_BASE_URL }}
        run: mvn test -Dspring.main.banner-mode=off -Dlogging.level.org.springframework=DEBUG
        working-directory: ./Backend/TripAI_Backend
